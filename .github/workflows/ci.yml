name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang tools
        run: sudo apt-get install -y clang-format-16 clang-tidy-16

      - name: clang-format check
        run: |
          clang-format-16 --dry-run --Werror $(git ls-files '*.cpp' '*.h') || true

      - name: Configure for clang-tidy
        run: |
          cmake -S . -B build -DCTORCH_CUDA=OFF -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-16 -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: clang-tidy check
        run: |
          clang-tidy-16 -p build $(git ls-files '*.cpp') || true

  build-test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        compiler:
          - { cc: gcc-12,    cxx: g++-12     }
          - { cc: clang-16,  cxx: clang++-16 }

    steps:
      - uses: actions/checkout@v4

      - name: Cache GoogleTest
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: gtest-v1.14.0-${{ matrix.compiler.cxx }}

      - name: Install compiler + tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.compiler.cc }} ninja-build cmake

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} \
            -DCTORCH_CUDA=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCTORCH_WERROR=ON

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure
